    <style>
        :root { --gold: #b8962d; --black: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; padding: 20px; }
        .container { max-width: 650px; background: var(--white); margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); }

        .input-group { margin-bottom: 20px; }

        .price-tag { color: var(--gold); font-weight: bold; min-width: 80px; text-align: right; }
        .total-section { background: var(--black); color: white; padding: 20px; border-radius: 10px; margin-top: 25px; text-align: center; }
        #total-price { font-size: 32px; color: var(--gold); display: block; font-weight: bold; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-decoration: none; text-align: center; font-size: 14px; }
        .btn-calc { background: var(--gold); color: white; grid-column: span 2; margin-bottom: 5px; }
        .btn-pdf { background: #d9534f; color: white; }
        .btn-wa { background: #25d366; color: white; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
